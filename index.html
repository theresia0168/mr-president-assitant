<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. President — Turn Sequence Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-seal">🏛️</div>
    <div class="header-text">
      <p class="header-sup">GMT Games — 2nd Edition</p>
      <h1 class="header-title">MR. PRESIDENT</h1>
      <p class="header-sub">Turn Sequence Tracker</p>
    </div>
    <div class="turn-badge">
      <span class="turn-badge-label">YEAR</span>
      <span class="turn-badge-num" id="turnDisplay">1</span>
      <span class="turn-badge-label">of 4</span>
    </div>
  </header>

  <!-- Progress Bar -->
  <div class="progress-shell">
    <div class="progress-phases">
      <span class="phase-label" data-phase="special">Special</span>
      <span class="phase-label" data-phase="phase1">Phase 1</span>
      <span class="phase-label" data-phase="phase2">Phase 2</span>
      <span class="phase-label" data-phase="phase3">Phase 3</span>
      <span class="phase-label" data-phase="phase4">Phase 4</span>
      <span class="phase-label" data-phase="final">Final</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-step-info">
      Step <span id="stepCurrent">1</span> of <span id="stepTotal">-</span>
    </div>
  </div>

  <!-- Main card area -->
  <main class="main-area">
    <div class="card-wrapper">

      <!-- Phase badge -->
      <div class="phase-badge" id="phaseBadge">US SPECIAL ACTIVATIONS</div>

      <!-- Sequence card -->
      <div class="sequence-card" id="sequenceCard">
        <div class="card-number" id="cardNumber">01</div>
        <h2 class="card-title" id="cardTitle">Loading...</h2>
        <p class="card-subtitle" id="cardSubtitle"></p>
        <div class="card-body" id="cardBody"></div>
        <div class="card-ref" id="cardRef"></div>
      </div>

      <!-- Navigation -->
      <div class="nav-row">
        <button class="nav-btn btn-prev" id="btnPrev" onclick="navigate(-1)">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
          Prev
        </button>

        <div class="nav-center">
          <button class="step-dot-btn" id="openOverview" onclick="toggleOverview()" title="Show all steps">
            <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="4" cy="12" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="20" cy="12" r="2" fill="currentColor"/></svg>
          </button>
        </div>

        <button class="nav-btn btn-next" id="btnNext" onclick="navigate(1)">
          Next
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
        </button>
      </div>

    </div>
  </main>

  <!-- Turn controls -->
  <div class="turn-controls">
    <button class="ctrl-btn" onclick="changeTurn(-1)" id="btnTurnPrev">◀ Prev Year</button>
    <button class="ctrl-btn ctrl-reset" onclick="resetToStep(0)">↺ Reset Step</button>
    <button class="ctrl-btn" onclick="changeTurn(1)" id="btnTurnNext">Next Year ▶</button>
  </div>

  <!-- Overview panel -->
  <div class="overview-backdrop" id="overviewBackdrop" onclick="toggleOverview()"></div>
  <div class="overview-panel" id="overviewPanel">
    <div class="overview-header">
      <h3>All Steps — Year <span id="overviewYear">1</span></h3>
      <button class="overview-close" onclick="toggleOverview()">✕</button>
    </div>
    <div class="overview-list" id="overviewList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
